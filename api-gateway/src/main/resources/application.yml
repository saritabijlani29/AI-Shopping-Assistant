server:
  port: 8080

spring:
  cloud:
    gateway:
      routes:
        - id: product-search-service
          uri: http://product-search-service:8081
          predicates:
            - Path=/api/products/**
          filters:
            - StripPrefix=1

        - id: ai-recommendation-service
          uri: http://ai-service:8082
          predicates:
            - Path=/api/ai/**
          metadata:
            response-timeout: 20000   # in milliseconds
            connect-timeout: 5000
          filters:
            - StripPrefix=1
#            - name: CircuitBreaker
#              args:
#                name: aiServiceCB
#                fallbackUri: forward:/fallback/ai

        - id: cache-service
          uri: http://cache-service:8083
          predicates:
            - Path=/api/cache/**
          filters:
            - StripPrefix=1