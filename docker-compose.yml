version: '3.8'

services:
  redis:
    image: redis:7
    ports:
      - "6379:6379"

  product-service:
    build: ./product-service
    ports:
      - "8081:8081"

  cache-service:
    build: ./cache-service
    ports:
      - "8083:8083"

  ai-service:
    build: ./ai-service
    ports:
      - "8082:8082"

  gateway:
    build: ./gateway
    ports:
      - "8080:8080"