apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: microservices
spec:
  replicas: 1
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
    spec:
      containers:
        - name: ai-service
          image: saritab/ai-recommendation-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8082
          env:
            - name: GIT_HUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: GIT_HUB_TOKEN
            - name: JAVA_OPTS
              value: "-Xms64m -Xmx192m"
            - name: SPRING_PROFILES_ACTIVE
              value: "dev"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 60
            timeoutSeconds: 5
            failureThreshold: 6
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 90
            timeoutSeconds: 5
            periodSeconds: 20
            failureThreshold: 3